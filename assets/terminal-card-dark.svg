<svg width="1080" height="420" viewBox="0 0 1080 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glassD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#111827" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="strokeD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#93c5fd" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.25"/>
    </linearGradient>
    <filter id="shadowD"><feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/></filter>
    <clipPath id="panelClipD"><rect x="20" y="76" width="1040" height="324" rx="22"/></clipPath>
    <style>
      .mono{font:600 18px "JetBrains Mono","SFMono-Regular",Menlo,Consolas,monospace;fill:#eaeef2;dominant-baseline:text-before-edge}
      .dim{opacity:.75}
      .h{font:700 16px "Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;fill:#c7d2fe}
    </style>
  </defs>

  <!-- window -->
  <rect x="20" y="20" width="1040" height="380" rx="22" fill="url(#glassD)" stroke="url(#strokeD)" filter="url(#shadowD)"/>
  <rect x="20" y="20" width="1040" height="56" rx="22" fill="#ffffff" opacity="0.06"/>

  <!-- titlebar -->
  <g transform="translate(46,48)">
    <circle r="7" fill="#ff5f56"/><circle cx="24" r="7" fill="#ffbd2e"/><circle cx="48" r="7" fill="#27c93f"/>
    <text class="h" x="76" y="0" dominant-baseline="middle">Terminal — zsh</text>
  </g>

  <!-- content: compact; starts ~12px below bar -->
  <g transform="translate(56,76)" class="mono" clip-path="url(#panelClipD)">
    <text y="12">$ <tspan class="dim">stack --core</tspan></text>
    <text y="42">&gt; MERN  |  ASP.NET/.NET  |  SQL</text>

    <text y="80">$ <tspan class="dim">skills --core</tspan></text>
    <text y="112">&gt; React • TypeScript • JavaScript • Node.js • Express • MongoDB</text>
    <text y="140">&gt; TailwindCSS • PostgreSQL • .NET • Docker • Postman • GitHub • Python • C++</text>

    <text y="178">$ <tspan class="dim">extras --bonus</tspan></text>
    <text y="206">&gt; OpenGL • OpenCV • REST • JWT • Prisma • SQLite • Redis • Nginx • AWS • Vercel • Cloudflare</text>
  </g>
</svg>
