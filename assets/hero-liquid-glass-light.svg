<svg width="1400" height="320" viewBox="0 0 1400 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- soft page-tint so it pops on white -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EEF2FF"/>
      <stop offset="1" stop-color="#E0F2FE"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="g2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0ea5e9" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#1f2937" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.42"/>
    </linearGradient>
    <filter id="blur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="70"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.20"/>
    </filter>
  </defs>

  <!-- tinted background so banner is visible on white -->
  <rect width="1400" height="320" fill="url(#bg)"/>

  <!-- gradient blobs -->
  <g filter="url(#blur)" opacity="0.9">
    <circle cx="160" cy="120" r="130" fill="url(#g1)"/>
    <circle cx="560" cy="60" r="120" fill="url(#g2)"/>
    <circle cx="1080" cy="250" r="170" fill="url(#g1)"/>
    <circle cx="1290" cy="90" r="120" fill="url(#g2)"/>
  </g>

  <!-- frosted panel -->
  <rect x="80" y="56" width="1240" height="208" rx="28" fill="url(#panel)" stroke="url(#stroke)" stroke-width="2" filter="url(#shadow)"/>
  <rect x="80" y="56" width="1240" height="70" rx="28" fill="#ffffff" opacity="0.25"/>

  <!-- mac window dots -->
  <g transform="translate(108,78)">
    <circle r="7" fill="#ff5f56"/>
    <circle cx="24" r="7" fill="#ffbd2e"/>
    <circle cx="48" r="7" fill="#27c93f"/>
  </g>

  <!-- title -->
  <g font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-weight="800">
    <text x="120" y="150" font-size="36" fill="#0f172a">MUNEEB ANJUM</text>
    <text x="120" y="188" font-size="20" fill="#1f2937" opacity="0.95">Full-Stack • MERN + .NET • Pixel-Perfect • Clean • Fast</text>
  </g>
</svg>
