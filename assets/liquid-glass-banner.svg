<svg width="1400" height="300" viewBox="0 0 1400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0.0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1.0" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="60" />
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- soft blobs -->
  <g filter="url(#blur)">
    <circle cx="140" cy="120" r="120" fill="#4fd1c5" opacity="0.35"/>
    <circle cx="420" cy="40"  r="110" fill="#60a5fa" opacity="0.35"/>
    <circle cx="980" cy="220" r="140" fill="#a78bfa" opacity="0.35"/>
    <circle cx="1260" cy="80" r="110" fill="#22d3ee" opacity="0.35"/>
  </g>

  <!-- frosted glass panel -->
  <rect x="80" y="48" width="1240" height="204" rx="28" fill="url(#panelGrad)" stroke="url(#stroke)" stroke-width="1.6" filter="url(#shadow)"/>

  <!-- top highlight -->
  <rect x="80" y="48" width="1240" height="74" rx="28" fill="#ffffff" opacity="0.10"/>

  <!-- mac window dots -->
  <g transform="translate(108,70)">
    <circle r="7" fill="#ff5f56"/>
    <circle cx="24" r="7" fill="#ffbd2e"/>
    <circle cx="48" r="7" fill="#27c93f"/>
  </g>

  <!-- title -->
  <g font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-weight="700">
    <text x="120" y="140" font-size="34" fill="#ffffff">MUNEEB ANJUM</text>
    <text x="120" y="178" font-size="20" fill="#ffffff" opacity="0.9">Full-Stack • MERN + .NET • Pixel-Perfect • Clean • Fast</text>
  </g>
</svg>
