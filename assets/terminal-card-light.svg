<svg width="1080" height="420" viewBox="0 0 1080 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glassL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#f8fafc" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="strokeL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0ea5e9" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#1f2937" stop-opacity="0.25"/>
    </linearGradient>
    <filter id="shadowL">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <style>
      .mono { font: 600 18px "JetBrains Mono", "SFMono-Regular", Menlo, Consolas, monospace; fill:#0f172a; }
      .dim  { opacity:.6 }
      .h    { font: 700 16px "Inter", system-ui, -apple-system, Segoe UI, Roboto, sans-serif; fill:#334155 }
      .tag  { font: 700 12px "Inter", system-ui, -apple-system, Segoe UI, Roboto, sans-serif; fill:#0369a1; }
    </style>
  </defs>

  <!-- window -->
  <rect x="20" y="20" width="1040" height="380" rx="22" fill="url(#glassL)" stroke="url(#strokeL)" filter="url(#shadowL)"/>
  <rect x="20" y="20" width="1040" height="56" rx="22" fill="#e2e8f0" opacity="0.6"/>
  <g transform="translate(46,48)">
    <circle r="7" fill="#ff5f56"/>
    <circle cx="24" r="7" fill="#ffbd2e"/>
    <circle cx="48" r="7" fill="#27c93f"/>
    <text class="h" x="76" y="6">Terminal — zsh</text>
  </g>

  <!-- content -->
  <g transform="translate(56,110)" class="mono">
    <text y="0">$ <tspan class="dim">whoami</tspan></text>
    <text y="32">&gt; Muneeb Anjum</text>

    <text y="80">$ <tspan class="dim">stack --core</tspan></text>
    <text y="112">&gt; MERN  |  ASP.NET/.NET  |  SQL</text>

    <text y="160">$ <tspan class="dim">skills --core</tspan></text>
    <text y="192">&gt; React • TypeScript • JavaScript • Node.js • Express • MongoDB</text>
    <text y="224">&gt; TailwindCSS • PostgreSQL • .NET • Docker • Postman • GitHub • Python • C++</text>

    <text y="272">$ <tspan class="dim">extras --bonus</tspan></text>
    <text y="304">&gt; OpenGL • OpenCV • REST • JWT • Prisma • SQLite • Redis • Nginx • AWS • Vercel • Cloudflare</text>
  </g>

  <g transform="translate(900,370)">
    <text class="tag">#exact-as-design</text>
  </g>
</svg>
