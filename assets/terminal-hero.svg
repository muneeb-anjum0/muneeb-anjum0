<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1200 420" width="1200" height="420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="macOS terminal hero">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f14"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Type reveal masks -->
    <mask id="reveal1">
      <rect x="80" y="130" width="0" height="28" fill="#fff">
        <animate attributeName="width" values="0;1000" dur="1.8s" begin="0.2s" fill="freeze"/>
      </rect>
    </mask>
    <mask id="reveal2">
      <rect x="80" y="180" width="0" height="28" fill="#fff">
        <animate attributeName="width" values="0;1000" dur="1.8s" begin="2.3s" fill="freeze"/>
      </rect>
    </mask>
    <mask id="reveal3">
      <rect x="80" y="230" width="0" height="28" fill="#fff">
        <animate attributeName="width" values="0;1000" dur="1.8s" begin="4.4s" fill="freeze"/>
      </rect>
    </mask>

    <style>
      .window { fill: url(#g1); stroke: #30363d; stroke-width: 2; }
      .title  { fill: #8b949e; font: 500 14px -apple-system,BlinkMacSystemFont,Segoe UI,Inter,system-ui,Arial; }
      .mono   { fill: #e6edf3; font: 600 22px SFMono-Regular,Consolas,Menlo,monospace; letter-spacing: 0.3px; }
      .dim    { fill: #9aa4b2; font: 500 20px SFMono-Regular,Consolas,Menlo,monospace; }
      .prompt { fill: #00e676; }
      .dotR { fill: #ff5f57; }
      .dotY { fill: #febc2e; }
      .dotG { fill: #28c840; }
      .badge { fill: #0d1117; stroke: #00e676; stroke-width: 1.2; }
      .badgeText { fill: #00e676; font: 600 13px SFMono-Regular,Consolas,Menlo,monospace; letter-spacing: .4px; }
      .cursor { fill: #00e676; }
    </style>
  </defs>

  <!-- Window -->
  <rect x="40" y="30" rx="16" ry="16" width="1120" height="360" class="window" filter="url(#softGlow)"/>
  <!-- Top bar -->
  <g transform="translate(60,46)">
    <circle r="7" class="dotR"/>
    <circle cx="20" r="7" class="dotY"/>
    <circle cx="40" r="7" class="dotG"/>
    <text x="70" y="5" class="title">Terminal — zsh — ~/muneeb</text>
  </g>

  <!-- Badges -->
  <g transform="translate(960,60)">
    <rect x="0" y="0" rx="10" ry="10" width="170" height="28" class="badge"/>
    <text x="12" y="19" class="badgeText">macOS • Dark • 120fps*</text>
  </g>

  <!-- Lines -->
  <g transform="translate(0,0)">
    <!-- Line 1 -->
    <g mask="url(#reveal1)">
      <text x="80"  y="130" class="mono"><tspan class="prompt">$</tspan> whoami</text>
      <text x="220" y="130" class="mono">Muneeb&nbsp;Anjum — Full-stack&nbsp;Engineer</text>
    </g>

    <!-- Line 2 -->
    <g mask="url(#reveal2)">
      <text x="80"  y="180" class="mono"><tspan class="prompt">$</tspan> focus</text>
      <text x="220" y="180" class="mono">React • TypeScript • ASP.NET • SQL/NoSQL • Azure</text>
    </g>

    <!-- Line 3 -->
    <g mask="url(#reveal3)">
      <text x="80"  y="230" class="mono"><tspan class="prompt">$</tspan> ethos</text>
      <text x="220" y="230" class="mono">Performance · Reliability · Developer&nbsp;Experience</text>
    </g>

    <!-- Blinking cursor after final line -->
    <rect x="980" y="212" width="16" height="28" class="cursor" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="1s" begin="6.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Footer hint -->
  <text x="600" y="355" text-anchor="middle" class="dim">Tip: click my Portfolio/LinkedIn above · Green = action</text>
</svg>
